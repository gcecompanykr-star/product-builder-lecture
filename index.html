<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup & Life | 오늘의 명언 & 점심 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">🌙 Dark Mode</button>
    </div>
    <div class="container">
        <h1>Startup & Life</h1>
        
        <!-- 명언 섹션 -->
        <div class="section quote-section">
            <h2>오늘의 명언</h2>
            <div id="quote-container">
                <p id="quote-en" class="quote-text">Click the button to get inspired!</p>
                <p id="quote-ko" class="quote-subtext">버튼을 눌러 영감을 얻으세요!</p>
                <p id="quote-author" class="quote-author"></p>
            </div>
            <button id="quote-btn">새 명언 가져오기</button>
        </div>

        <!-- 점심 메뉴 추천 섹션 -->
        <div class="section lunch-section">
            <h2>점심 메뉴 추천</h2>
            <div class="main-layout">
                <div class="roulette-container">
                    <div class="roulette-wrapper">
                        <canvas id="roulette-canvas" width="400" height="400"></canvas>
                        <div class="pointer">▼</div>
                    </div>
                    <button id="spin-btn">룰렛 돌리기!</button>
                </div>
                
                <div class="result-side">
                    <div id="selected-result">
                        <h3 id="selected-menu-name">메뉴를 골라보세요!</h3>
                        <div id="food-image-container"></div>
                    </div>
                    <div class="history-container">
                        <h4>최근 추천 메뉴 (최대 5개)</h4>
                        <ul id="menu-history"></ul>
                    </div>
                </div>
            </div>
        <!-- 제휴 문의 섹션 -->
        <div class="section contact-section">
            <h2>제휴 문의</h2>
            <p class="section-desc">서비스 제휴 및 비즈니스 문의는 아래 폼을 통해 남겨주세요.</p>
            <form action="https://formspree.io/f/maqpjvny" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">성함 / 업체명</label>
                    <input type="text" id="name" name="name" placeholder="홍길동 / (주)스타트업" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">문의 제목</label>
                    <input type="text" id="subject" name="subject" placeholder="제휴 제안 드립니다" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="자세한 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
                <div id="form-status"></div>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
