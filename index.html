<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup & Life Quotes | Lunch Roulette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">🌙 Dark Mode</button>
    </div>
    <div class="container">
        <h1>Startup & Life</h1>
        
        <div class="section quote-section">
            <h2>Today's Quote</h2>
            <div id="quote-container">
                <p id="quote-en" class="quote-text">Click the button to get inspired!</p>
                <p id="quote-ko" class="quote-subtext">버튼을 눌러 영감을 얻으세요!</p>
            </div>
            <button id="quote-btn">New Quote</button>
        </div>

        <div class="section lunch-section">
            <h2>Lunch Roulette</h2>
            <div class="roulette-wrapper">
                <div id="roulette-wheel" class="wheel"></div>
                <div class="pointer">▼</div>
            </div>
            <div id="selected-menu">What's for lunch?</div>
            <button id="spin-btn">Spin the Wheel!</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
